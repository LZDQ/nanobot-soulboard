session_name: soulboard
start_directory: ./

environment:
  NANOBOT_MAX_CONCURRENT_REQUESTS: "10"

windows:
  - window_name: bash
    focus: true
    panes:
      - blank

  - window_name: config
    start_directory: ~/.nanobot
    panes:
      - blank

  - window_name: deploy-backend
    panes:
      - shell_command:
          - source .venv/bin/activate
          - python -m nanobot_soulboard

  - window_name: deploy-frontend
    start_directory: ./frontend
    panes:
      - shell_command:
          - source ~/.nvm/nvm.sh
          - nvm use
          - pnpm build && pnpm preview

  # - window_name: ttyd
  #   panes:
  #     - shell_command:
  #         - ttyd -i lo -W bash
