session_name: soulboard
start_directory: ./

windows:
  - window_name: main
    focus: true
    panes:
      - blank

  - window_name: config
    start_directory: ~/.nanobot
    panes:
      - blank

  - window_name: uvicorn
    panes:
      - environment:
          SOULBOARD_URL_PREFIX: /soulboard
          # NANOBOT_MAX_CONCURRENT_REQUESTS: "10"
        shell_command:
          - source .venv/bin/activate
          - uvicorn nanobot_soulboard.server:create_app --factory --host 127.0.0.1 --port 18791
